[tools]
"aqua:bats-core/bats-core" = "1.12.0"

[tasks.build-containerfile]
description = "Build image with Containerfile"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
build_flags="${BUILD_FLAGS:---layers=false}"
build_tmpdir="${BUILD_TMPDIR:-${TMPDIR:-/tmp}/arch-bootc-build}"

mkdir -p "$build_tmpdir"
if command -v run0 >/dev/null 2>&1; then
  run0 sh -c 'TMPDIR="'$build_tmpdir'" podman build '$build_flags' -t "'$image_name':latest" .'
else
  TMPDIR="$build_tmpdir" podman build $build_flags -t "$image_name:latest" .
fi
'''

[tasks.build-log]
description = "Build image and write build.log"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
image_tag="${BUILD_IMAGE_TAG:-latest}"
build_flags="${BUILD_FLAGS:---layers=false}"
build_tmpdir="${BUILD_TMPDIR:-${TMPDIR:-/tmp}/arch-bootc-build}"

mkdir -p "$build_tmpdir"
if command -v run0 >/dev/null 2>&1; then
  run0 sh -c 'TMPDIR="'$build_tmpdir'" podman build '$build_flags' -t "'$image_name':'$image_tag'" . 2>&1 | tee build.log'
else
  TMPDIR="$build_tmpdir" podman build $build_flags -t "$image_name:$image_tag" . 2>&1 | tee build.log
fi
'''

[tasks.build-log-ts]
description = "Build image and write timestamped build.log"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
image_tag="${BUILD_IMAGE_TAG:-latest}"
build_flags="${BUILD_FLAGS:---layers=false}"
build_tmpdir="${BUILD_TMPDIR:-${TMPDIR:-/tmp}/arch-bootc-build}"

mkdir -p "$build_tmpdir"
if command -v run0 >/dev/null 2>&1; then
  run0 sh -c 'TMPDIR="'$build_tmpdir'" podman build '$build_flags' -t "'$image_name':'$image_tag'" . 2>&1 | awk '\''{ print strftime("[%Y-%m-%d %H:%M:%S]"), $0; fflush(); }'\'' | tee build.log'
else
  TMPDIR="$build_tmpdir" podman build $build_flags -t "$image_name:$image_tag" . 2>&1 | awk '{ print strftime("[%Y-%m-%d %H:%M:%S]"), $0; fflush(); }' | tee build.log
fi
'''

[tasks.bootc]
description = "Run bootc in the built image (pass args after --)"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
image_tag="${BUILD_IMAGE_TAG:-latest}"
base_dir="${BUILD_BASE_DIR:-.}"
if [ "${image_name#*/}" = "$image_name" ]; then
  image_ref="localhost/$image_name:$image_tag"
else
  image_ref="$image_name:$image_tag"
fi

runner=""
if command -v run0 >/dev/null 2>&1; then
  runner="run0"
fi

selinux_mount=""
if [ -d /sys/fs/selinux ]; then
  selinux_mount="-v /sys/fs/selinux:/sys/fs/selinux"
fi

$runner sh -c '
  set -eu
  podman run \
    --rm --privileged --pid=host \
    -it \
    '"$selinux_mount"' \
    -v /etc/containers:/etc/containers:Z \
    -v /var/lib/containers:/var/lib/containers:Z \
    -v /dev:/dev \
    -e RUST_LOG=debug \
    -v "'"$base_dir"':/data" \
    --security-opt label=type:unconfined_t \
    "'"$image_ref"'" bootc "$@"
' -- "$@"
'''

[tasks.generate-bootable-image]
description = "Install built image to bootable.img"
run = '''
set -eu
base_dir="${BUILD_BASE_DIR:-.}"
filesystem="${BUILD_FILESYSTEM:-ext4}"

if [ ! -e "$base_dir/bootable.img" ] ; then
  fallocate -l 20G "$base_dir/bootable.img"
fi
mise run bootc -- install to-disk --composefs-backend --via-loopback /data/bootable.img --filesystem "$filesystem" --wipe --bootloader systemd
'''

[tasks.generate-vm-artifact]
description = "Build/update bootable.img and write its source image-id stamp"
run = 'exec ./scripts/generate-vm-artifact.sh'

[tasks.upgrade]
description = "Build image and switch local host via bootc"
run = '''
set -eux
build_flags="${BUILD_FLAGS:---layers=false}"
build_tmpdir="${BUILD_TMPDIR:-/var/tmp/arch-bootc-build}"

tmpfile=""
trap 'rm -f "${tmpfile:-}"' EXIT
tmpfile="$(mktemp)"
mkdir -p "$build_tmpdir"
TMPDIR="$build_tmpdir" podman build $build_flags --iidfile "$tmpfile" -t arch-bootc:latest .
img_id="$(sed 's/^sha256://' "$tmpfile")"
echo "Built image: $img_id"
bootc switch --transport containers-storage "$img_id"
reboot
'''

[tasks.test-structure]
description = "Run podman-native structure tests against built image"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
image_tag="${BUILD_IMAGE_TAG:-latest}"
exec ./scripts/with-podman-wrapper.sh env IMAGE_UNDER_TEST="$image_name:$image_tag" mise exec -- bats tests/structure/hypr-structure.bats
'''

[tasks.test-smoke-container]
description = "Run container smoke tests against built image"
run = '''
set -eu
image_name="${BUILD_IMAGE_NAME:-arch-bootc}"
image_tag="${BUILD_IMAGE_TAG:-latest}"
exec ./scripts/with-podman-wrapper.sh env IMAGE_UNDER_TEST="$image_name:$image_tag" mise exec -- bats tests/smoke/container-hypr.bats
'''

[tasks.test-smoke-vm]
description = "Run VM smoke tests over SSH (requires BOOTC_VM_SSH)"
run = '''
set -eu
mise exec -- bats tests/smoke/vm-bootc.bats
'''

[tasks.test-smoke-vm-local]
description = "Boot local bootable.img with qemu and run VM smoke tests"
run = 'exec ./scripts/boot-vm-smoke.sh'

[tasks.test-smoke-vm-sandbox]
description = "Boot an existing stamped bootable.img and run VM smoke tests without sudo/rootful podman"
run = 'BOOTC_VM_SANDBOX=1 BOOTC_VM_INJECT_LOADER_KARGS=0 BOOTC_PODMAN_USE_RUN0=0 BOOTC_VM_SKIP_IMAGE_CHECKS=1 BOOTC_VM_SKIP_BOOTABLE_REGEN=1 BOOTC_VM_SANDBOX_REQUIRE_ARTIFACT_STAMP="${BOOTC_VM_SANDBOX_REQUIRE_ARTIFACT_STAMP:-1}" mise run test-smoke-vm-local'

[tasks.test-smoke-vm-graphical]
description = "Boot local bootable.img with QEMU graphics and smoke-test a UWSM graphical session"
run = 'BOOTC_VM_GRAPHICAL_SESSION_SMOKE=1 BOOTC_VM_QEMU_DISPLAY="${BOOTC_VM_QEMU_DISPLAY:-gtk,gl=off}" BOOTC_VM_QEMU_GPU="${BOOTC_VM_QEMU_GPU:-virtio-vga}" BOOTC_VM_FOLLOW_LOG="${BOOTC_VM_FOLLOW_LOG:-0}" BOOTC_VM_SKIP_IMAGE_CHECKS="${BOOTC_VM_SKIP_IMAGE_CHECKS:-1}" BOOTC_VM_SKIP_BOOTABLE_REGEN="${BOOTC_VM_SKIP_BOOTABLE_REGEN:-1}" BOOTC_PODMAN_USE_RUN0=0 mise run test-smoke-vm-local'

[tasks.test-smoke-vm-sandbox-graphical]
description = "Boot an existing stamped bootable.img in sandbox mode with QEMU graphics to reproduce pre-login homed/graphics state"
run = 'BOOTC_VM_SANDBOX=1 BOOTC_VM_GRAPHICAL_SESSION_SMOKE=1 BOOTC_VM_QEMU_DISPLAY="${BOOTC_VM_QEMU_DISPLAY:-gtk,gl=off}" BOOTC_VM_QEMU_GPU="${BOOTC_VM_QEMU_GPU:-virtio-vga}" BOOTC_VM_FOLLOW_LOG="${BOOTC_VM_FOLLOW_LOG:-0}" BOOTC_VM_INJECT_LOADER_KARGS=0 BOOTC_PODMAN_USE_RUN0=0 BOOTC_VM_SKIP_IMAGE_CHECKS=1 BOOTC_VM_SKIP_BOOTABLE_REGEN=1 BOOTC_VM_SANDBOX_REQUIRE_ARTIFACT_STAMP="${BOOTC_VM_SANDBOX_REQUIRE_ARTIFACT_STAMP:-1}" mise run test-smoke-vm-local'

[tasks.run-vm-graphical]
description = "Boot local bootable.img with QEMU graphics and leave the VM open without running smoke tests"
run = 'BOOTC_VM_GRAPHICAL_SESSION_SMOKE=1 BOOTC_VM_RUN_TESTS=0 BOOTC_VM_QEMU_DISPLAY="${BOOTC_VM_QEMU_DISPLAY:-gtk,gl=off}" BOOTC_VM_QEMU_GPU="${BOOTC_VM_QEMU_GPU:-virtio-vga}" BOOTC_VM_FOLLOW_LOG="${BOOTC_VM_FOLLOW_LOG:-0}" BOOTC_VM_SKIP_IMAGE_CHECKS="${BOOTC_VM_SKIP_IMAGE_CHECKS:-1}" BOOTC_VM_SKIP_BOOTABLE_REGEN="${BOOTC_VM_SKIP_BOOTABLE_REGEN:-1}" BOOTC_PODMAN_USE_RUN0=0 mise run test-smoke-vm-local'
