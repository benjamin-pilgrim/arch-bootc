monitor = eDP-1, highrr, auto, 1.0
monitor = , preferred, auto, auto

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XCURSOR_SIZE,24

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- hyprpaper --config /usr/share/hypr/hyprpaper.conf

input {
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        clickfinger_behavior = true
    }

    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(c78272ee) rgba(643722ee) 45deg
    col.inactive_border = rgba(161D25aa)

    layout = dwindle

    allow_tearing = false
    resize_on_border = true
}

windowrule = match:fullscreen 1, border_color rgb(158833)

decoration {
    rounding = 3
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 3
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

gestures {
    gesture = 3, horizontal, workspace, scale:1.5
    gesture = 3, vertical, fullscreen
    workspace_swipe_cancel_ratio = 3
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^(1Password)$, match:title ^(1Password Access Requested.*)$, float on, center on, size 900 650, stay_focused on
windowrule = match:class ^(hyprpolkitagent)$, float on, center on, stay_focused on
windowrule = match:class ^(pinentry-.*)$, float on, center on, stay_focused on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, center on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, stay_focused on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, border_size 0

$terminal = uwsm app -- kitty
$fileManager = uwsm app -- nautilus
$menu = uwsm app -- walker
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, N, exec, /usr/share/hypr/scripts/terminal-from-active
bind = $mainMod SHIFT, N, exec, /usr/share/hypr/scripts/terminal-from-active fork-codex
bind = $mainMod, A, exec, /usr/share/hypr/scripts/terminal-from-active new-codex
bind = $mainMod SHIFT, A, exec, /usr/share/hypr/scripts/terminal-from-active fork-codex
bind = SUPER, B, exec, /usr/share/hypr/scripts/browser-tab-to-chrome-app
bind = $mainMod, E, exec, $fileManager
bind = SUPER, SPACE, exec, nc -U $XDG_RUNTIME_DIR/walker/walker.sock
bind = SUPER, F12, exec, sh -lc 'hyprctl activewindow | wl-copy && notify-send "Hyprland" "Active window copied to clipboard"'
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 1
bind = SUPER, F11, fullscreenstate, 0 2 toggle
bind = $mainMod, P, pseudo
bind = SUPER, J, layoutmsg, togglesplit
bind = SUPER_SHIFT, C, exec, hyprpicker -a
bind = ALT, tab, workspace, m+1
bind = ALT SHIFT, tab, workspace, m-1
bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d
bind = SUPER_SHIFT, left, movetoworkspace, r-1
bind = SUPER_SHIFT, right, movetoworkspace, r+1
bind = $mainMod, l, exec, hyprlock --config /usr/share/hypr/hyprlock.conf
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = , XF86AudioRaiseVolume, exec, sh -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+'
bindel = , XF86AudioLowerVolume, exec, sh -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-'
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bind = SUPER, PRINT, exec, hyprshot -z -m window
bind = , PRINT, exec, hyprshot -z -m output
bind = SHIFT, PRINT, exec, hyprshot -z -m region
